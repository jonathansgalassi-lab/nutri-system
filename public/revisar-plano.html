<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Revisão de Plano Alimentar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #2d9b6e; --verde-claro: #e8f7f1; --amarelo: #f6c90e;
      --vermelho: #e53e3e; --cinza: #f5f5f5; --borda: #e0e0e0;
      --texto: #1a1a2e; --raio: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cinza); color: var(--texto); }

    header {
      background: var(--verde); color: white;
      padding: 16px 24px; display: flex; align-items: center;
      justify-content: space-between; gap: 16px; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .badge-tempo {
      background: rgba(255,255,255,.2); border-radius: 20px;
      padding: 4px 12px; font-size: 0.8rem;
    }

    .barra-acoes {
      background: white; border-bottom: 1px solid var(--borda);
      padding: 12px 24px; display: flex; gap: 12px; align-items: center;
      flex-wrap: wrap;
    }
    .btn { padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn:active { transform: scale(.97); }
    .btn-aprovar { background: var(--verde); color: white; }
    .btn-aprovar:disabled { opacity: .5; cursor: not-allowed; }
    .btn-outline { background: white; color: var(--verde);
      border: 2px solid var(--verde); }
    .info-tempo { font-size: 0.82rem; color: #666; margin-left: auto; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 20px; }

    /* Resumo */
    .resumo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 24px; }
    .resumo-card { background: white; border-radius: var(--raio);
      padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .resumo-card .valor { font-size: 1.6rem; font-weight: 700; color: var(--verde); }
    .resumo-card .label { font-size: 0.75rem; color: #888; margin-top: 4px; }

    /* Alertas */
    .alertas { margin-bottom: 20px; }
    .alerta-item { background: #fff8e1; border-left: 4px solid var(--amarelo);
      border-radius: 0 8px 8px 0; padding: 10px 14px;
      margin-bottom: 8px; font-size: 0.9rem; }
    .recomendacao-item { background: var(--verde-claro); border-left: 4px solid var(--verde);
      border-radius: 0 8px 8px 0; padding: 10px 14px;
      margin-bottom: 8px; font-size: 0.9rem; }

    /* Tabs de refeição */
    .tabs { display: flex; overflow-x: auto; gap: 4px;
      background: white; border-radius: var(--raio) var(--raio) 0 0;
      padding: 8px 8px 0; border-bottom: 2px solid var(--borda); }
    .tab { padding: 10px 16px; border-radius: 8px 8px 0 0; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; border: none; background: none;
      color: #888; white-space: nowrap; border-bottom: 3px solid transparent;
      transition: all .2s; }
    .tab.ativa { color: var(--verde); border-color: var(--verde); }

    /* Conteúdo das refeições */
    .refeicao-content { background: white; border-radius: 0 0 var(--raio) var(--raio);
      padding: 20px; margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); }

    .opcao-card { border: 1.5px solid var(--borda); border-radius: 8px;
      margin-bottom: 16px; overflow: hidden; }
    .opcao-header { background: var(--verde-claro); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; }
    .opcao-header h3 { font-size: 0.95rem; font-weight: 700; }
    .opcao-macros { display: flex; gap: 8px; flex-wrap: wrap; }
    .macro-badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
      font-weight: 600; }
    .macro-cho { background: #fff3cd; color: #856404; }
    .macro-ptn { background: #d1ecf1; color: #0c5460; }
    .macro-lip { background: #f8d7da; color: #721c24; }
    .macro-kcal { background: #e2e3e5; color: #383d41; }

    .opcao-body { padding: 16px; }
    .ingredientes { list-style: none; margin-bottom: 12px; }
    .ingredientes li { padding: 4px 0; font-size: 0.88rem; display: flex;
      justify-content: space-between; border-bottom: 1px solid #f5f5f5; }
    .ingredientes li:last-child { border: none; }
    .qty { color: #888; font-style: italic; }

    .modo-preparo { background: var(--cinza); border-radius: 6px;
      padding: 10px 14px; font-size: 0.86rem; line-height: 1.5;
      margin-top: 8px; }

    [contenteditable="true"] {
      outline: none; border-bottom: 2px dashed var(--verde);
      cursor: text; min-width: 20px; display: inline-block;
    }
    [contenteditable="true"]:focus { background: #fffbea; border-radius: 3px; }

    /* Loading */
    .loading { display: none; text-align: center; padding: 60px 20px; }
    .spinner { width: 50px; height: 50px; border: 4px solid var(--borda);
      border-top-color: var(--verde); border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .erro { background: #fff5f5; border: 1px solid #fed7d7;
      border-radius: var(--raio); padding: 20px; text-align: center;
      color: var(--vermelho); display: none; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e;
      color: white; padding: 12px 20px; border-radius: 8px; font-size: 0.9rem;
      transform: translateY(100px); opacity: 0; transition: all .3s;
      z-index: 1000; }
    .toast.visivel { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🥦 Revisão do Plano Alimentar</h1>
    <div style="font-size:.8rem;opacity:.8;margin-top:2px" id="info-paciente">Carregando...</div>
  </div>
  <div class="badge-tempo">⏱️ Tempo médio de revisão: ~5–10 min</div>
</header>

<div class="barra-acoes">
  <button class="btn btn-outline" onclick="history.back()">← Voltar</button>
  <button class="btn btn-aprovar" id="btn-aprovar" onclick="aprovarPlano()" disabled>
    ✅ Aprovar e Publicar no Webdiet
  </button>
  <span class="info-tempo" id="cronometro">⏱ 00:00</span>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:#666">Gerando plano com GPT-4o...<br>
      <small>Isso pode levar até 30 segundos</small></p>
  </div>

  <div class="erro" id="erro">
    <strong>Erro ao carregar plano</strong>
    <p id="msg-erro" style="margin-top:8px"></p>
  </div>

  <div id="conteudo" style="display:none">
    <!-- Resumo nutricional -->
    <div class="resumo-grid" id="resumo-grid"></div>

    <!-- Alertas para o nutricionista -->
    <div class="alertas" id="alertas"></div>

    <!-- Recomendações -->
    <div id="recomendacoes"></div>

    <!-- Tabs de refeição -->
    <div class="tabs" id="tabs"></div>
    <div class="refeicao-content" id="refeicao-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REFEICOES_LABEL = {
  cafe_manha:   '☀️ Café da Manhã',
  lanche_manha: '🍎 Lanche Manhã',
  almoco:       '🍽️ Almoço',
  lanche_tarde: '🥜 Lanche Tarde',
  jantar:       '🌙 Jantar',
  ceia:         '🌛 Ceia',
};

let planoData = null;
let planoId = null;
let inicioRevisao = Date.now();
let refeicaoAtiva = 'cafe_manha';

// ── Cronômetro ───────────────────────────────────────────────
setInterval(() => {
  const seg = Math.floor((Date.now() - inicioRevisao) / 1000);
  const m = String(Math.floor(seg / 60)).padStart(2, '0');
  const s = String(seg % 60).padStart(2, '0');
  document.getElementById('cronometro').textContent = `⏱ ${m}:${s}`;
}, 1000);

// ── Inicialização ────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  planoId = params.get('id');
  const pacienteId = params.get('paciente_id');

  if (!planoId && !pacienteId) {
    mostrarErro('Informe ?id=PLANO_ID ou ?paciente_id=PACIENTE_ID na URL.');
    return;
  }

  mostrarLoading(true);

  try {
    if (planoId) {
      // Carrega plano existente
      const res = await fetch(`/api/planos/${planoId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      renderizarPlano(data.plano, data.plano.conteudo);
    } else {
      // Gera novo plano
      const res = await fetch('/api/planos/gerar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paciente_id: pacienteId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      planoId = data.plano.id;
      history.replaceState({}, '', `?id=${planoId}`);
      renderizarPlano(data.plano, data.plano.conteudo);
    }
  } catch (err) {
    mostrarErro(err.message || 'Erro desconhecido');
  }
}

function mostrarLoading(sim) {
  document.getElementById('loading').style.display = sim ? 'block' : 'none';
  document.getElementById('conteudo').style.display = sim ? 'none' : 'block';
}

function mostrarErro(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('erro').style.display = 'block';
  document.getElementById('msg-erro').textContent = msg;
}

// ── Renderização ─────────────────────────────────────────────
function renderizarPlano(plano, conteudo) {
  planoData = conteudo;

  document.getElementById('info-paciente').textContent =
    `Plano #${plano.id?.slice(0,8)} · Gerado por IA · Status: ${plano.status}`;

  // Resumo
  const r = conteudo.resumo;
  document.getElementById('resumo-grid').innerHTML = `
    <div class="resumo-card">
      <div class="valor">${r.get ?? '—'}</div>
      <div class="label">GET (kcal/dia)</div>
    </div>
    <div class="resumo-card">
      <div class="valor">${r.meta_calorica ?? '—'}</div>
      <div class="label">Meta Calórica</div>
    </div>
    <div class="resumo-card">
      <div class="valor">${r.macros?.cho_g ?? '—'}g</div>
      <div class="label">Carboidrato</div>
    </div>
    <div class="resumo-card">
      <div class="valor">${r.macros?.ptn_g ?? '—'}g</div>
      <div class="label">Proteína</div>
    </div>
    <div class="resumo-card">
      <div class="valor">${r.macros?.lip_g ?? '—'}g</div>
      <div class="label">Gordura</div>
    </div>
  `;

  // Alertas
  const alertasEl = document.getElementById('alertas');
  alertasEl.innerHTML = '';
  (conteudo.alertas_nutricionista ?? []).forEach(a => {
    alertasEl.innerHTML += `<div class="alerta-item">⚠️ ${a}</div>`;
  });

  // Recomendações
  const recEl = document.getElementById('recomendacoes');
  recEl.innerHTML = '';
  (conteudo.recomendacoes ?? []).forEach(r => {
    recEl.innerHTML += `<div class="recomendacao-item">✅ ${r}</div>`;
  });

  // Tabs
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  const semana = conteudo.plano?.semana_1_4 ?? {};
  Object.keys(REFEICOES_LABEL).forEach(key => {
    if (!semana[key]) return;
    const tab = document.createElement('button');
    tab.className = 'tab' + (key === refeicaoAtiva ? ' ativa' : '');
    tab.textContent = REFEICOES_LABEL[key];
    tab.onclick = () => mudarRefeicao(key);
    tabs.appendChild(tab);
  });

  renderizarRefeicao(refeicaoAtiva);
  mostrarLoading(false);
  document.getElementById('btn-aprovar').disabled = false;
}

function mudarRefeicao(key) {
  refeicaoAtiva = key;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('ativa', t.textContent === REFEICOES_LABEL[key]);
  });
  renderizarRefeicao(key);
}

function renderizarRefeicao(key) {
  const semana = planoData?.plano?.semana_1_4 ?? {};
  const opcoes = semana[key] ?? [];
  const el = document.getElementById('refeicao-content');

  if (!opcoes.length) {
    el.innerHTML = '<p style="color:#888;text-align:center;padding:20px">Sem opções para esta refeição.</p>';
    return;
  }

  el.innerHTML = opcoes.map((op, idx) => `
    <div class="opcao-card">
      <div class="opcao-header">
        <h3>Opção ${idx + 1}: <span contenteditable="true" data-path="${key}.${idx}.nome">${op.nome}</span></h3>
        <div class="opcao-macros">
          <span class="macro-badge macro-kcal">🔥 <span contenteditable="true" data-path="${key}.${idx}.calorias">${op.calorias}</span> kcal</span>
          <span class="macro-badge macro-cho">CHO <span contenteditable="true" data-path="${key}.${idx}.macros.cho_g">${op.macros?.cho_g ?? 0}</span>g</span>
          <span class="macro-badge macro-ptn">PTN <span contenteditable="true" data-path="${key}.${idx}.macros.ptn_g">${op.macros?.ptn_g ?? 0}</span>g</span>
          <span class="macro-badge macro-lip">LIP <span contenteditable="true" data-path="${key}.${idx}.macros.lip_g">${op.macros?.lip_g ?? 0}</span>g</span>
        </div>
      </div>
      <div class="opcao-body">
        <ul class="ingredientes">
          ${(op.ingredientes ?? []).map((ing, iIdx) => `
            <li>
              <span contenteditable="true" data-path="${key}.${idx}.ingredientes.${iIdx}.item">${ing.item}</span>
              <span class="qty"><span contenteditable="true" data-path="${key}.${idx}.ingredientes.${iIdx}.quantidade">${ing.quantidade}</span></span>
            </li>
          `).join('')}
        </ul>
        <div class="modo-preparo">
          📝 <strong>Modo de preparo:</strong><br>
          <span contenteditable="true" data-path="${key}.${idx}.modo_preparo">${op.modo_preparo}</span>
        </div>
      </div>
    </div>
  `).join('');

  // Detecta edições inline
  el.querySelectorAll('[contenteditable]').forEach(el => {
    el.addEventListener('blur', () => sincronizarEdicoes());
  });
}

// ── Sincroniza edições inline com planoData ───────────────────
function sincronizarEdicoes() {
  const semana = planoData.plano.semana_1_4;
  document.querySelectorAll('[contenteditable][data-path]').forEach(el => {
    const path = el.getAttribute('data-path').split('.');
    const [refeicao, idxStr, ...resto] = path;
    const idx = parseInt(idxStr);
    if (!semana[refeicao]?.[idx]) return;
    let obj = semana[refeicao][idx];
    for (let i = 0; i < resto.length - 1; i++) {
      obj = obj[resto[i]];
    }
    const last = resto[resto.length - 1];
    const val = el.textContent.trim();
    obj[last] = isNaN(Number(val)) || val === '' ? val : Number(val);
  });
}

// ── Aprovar plano ────────────────────────────────────────────
async function aprovarPlano() {
  sincronizarEdicoes();
  const btn = document.getElementById('btn-aprovar');
  btn.disabled = true;
  btn.textContent = 'Aprovando...';

  try {
    const res = await fetch(`/api/planos/${planoId}/aprovar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conteudo_editado: planoData }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    mostrarToast('✅ Plano aprovado e publicação no Webdiet iniciada!');
    btn.textContent = '✅ Aprovado!';
    btn.style.background = '#276749';
  } catch (err) {
    mostrarToast('❌ Erro: ' + err.message, true);
    btn.disabled = false;
    btn.textContent = '✅ Aprovar e Publicar no Webdiet';
  }
}

function mostrarToast(msg, erro = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = erro ? '#c53030' : '#1a1a2e';
  t.classList.add('visivel');
  setTimeout(() => t.classList.remove('visivel'), 4000);
}

init();
</script>
</body>
</html>
